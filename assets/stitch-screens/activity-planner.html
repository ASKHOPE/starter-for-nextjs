<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-surface-variant": "#45474c",
                        "inverse-primary": "#bcc7de",
                        "on-tertiary-container": "#8191a9",
                        "inverse-on-surface": "#eff1f3",
                        "on-background": "#191c1e",
                        "surface-container-high": "#e6e8ea",
                        "outline-variant": "#c5c6cd",
                        "on-primary-container": "#8590a6",
                        "primary": "#091426",
                        "secondary": "#006591",
                        "surface-container-highest": "#e0e3e5",
                        "secondary-fixed-dim": "#89ceff",
                        "on-secondary-container": "#004666",
                        "on-tertiary-fixed-variant": "#38485d",
                        "secondary-fixed": "#c9e6ff",
                        "error-container": "#ffdad6",
                        "surface-variant": "#e0e3e5",
                        "tertiary-fixed": "#d3e4fe",
                        "on-primary-fixed": "#111c2d",
                        "surface": "#f7f9fb",
                        "on-secondary-fixed": "#001e2f",
                        "primary-fixed": "#d8e3fb",
                        "tertiary": "#041528",
                        "secondary-container": "#39b8fd",
                        "on-primary-fixed-variant": "#3c475a",
                        "on-error-container": "#93000a",
                        "on-secondary-fixed-variant": "#004c6e",
                        "outline": "#75777d",
                        "primary-container": "#1e293b",
                        "error": "#ba1a1a",
                        "surface-dim": "#d8dadc",
                        "surface-container-low": "#f2f4f6",
                        "primary-fixed-dim": "#bcc7de",
                        "on-primary": "#ffffff",
                        "on-tertiary": "#ffffff",
                        "on-secondary": "#ffffff",
                        "surface-tint": "#545f73",
                        "tertiary-fixed-dim": "#b7c8e1",
                        "surface-container-lowest": "#ffffff",
                        "inverse-surface": "#2d3133",
                        "background": "#f7f9fb",
                        "surface-bright": "#f7f9fb",
                        "on-tertiary-fixed": "#0b1c30",
                        "on-surface": "#191c1e",
                        "on-error": "#ffffff",
                        "tertiary-container": "#1a2a3e",
                        "surface-container": "#eceef0"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "stack-sm": "8px",
                        "stack-lg": "32px",
                        "gutter": "16px",
                        "unit": "4px",
                        "margin-tablet": "48px",
                        "stack-md": "16px",
                        "margin-mobile": "24px"
                    },
                    "fontFamily": {
                        "body-lg": ["Outfit"],
                        "label-sm": ["Outfit"],
                        "body-sm": ["Outfit"],
                        "headline-lg": ["Outfit"],
                        "label-md": ["Outfit"],
                        "headline-xl": ["Outfit"],
                        "headline-md": ["Outfit"],
                        "body-md": ["Outfit"]
                    },
                    "fontSize": {
                        "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}],
                        "label-sm": ["10px", {"lineHeight": "14px", "fontWeight": "500"}],
                        "body-sm": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                        "headline-lg": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                        "label-md": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600"}],
                        "headline-xl": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "headline-md": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
                        "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            line-height: 1;
            text-transform: none;
            letter-spacing: normal;
            word-wrap: normal;
            white-space: nowrap;
            direction: ltr;
        }
        body { font-family: 'Outfit', sans-serif; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-background text-on-background min-h-screen pb-32">
<!-- TopAppBar -->
<nav class="bg-surface shadow-[0_4px_20px_rgba(30,41,59,0.05)] sticky top-0 z-50">
<div class="flex justify-between items-center px-margin-mobile h-16 w-full max-w-7xl mx-auto">
<div class="flex items-center gap-4">
<button class="material-symbols-outlined text-primary active:scale-95 transition-transform duration-200">menu</button>
<span class="font-headline-lg text-headline-lg font-bold text-primary tracking-tight">Gospel Agenda</span>
</div>
<div class="flex items-center gap-4">
<div class="w-8 h-8 rounded-full bg-secondary-container flex items-center justify-center overflow-hidden">
<img alt="User profile" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAqdRihMVy6_S4dr1XYwHP5CVjwECTtg7SO9_MK3omMxJ2G54fthOutdcrML0Xg5jUI0q820XvM1KUb-2X601dwgYxkU8u3YDzisIU0IZhYZ4plM4ZUTPgrcLIoz0xa1W7DYngwzh43lZMoj7rDk0qg8U73TEfh-S4Hp4JN_egyrb4i2rXLTK3o6u1KOIgE2PaOnH1B6dGGI0bN4KD1vpuMUA5Y-7Zt7xc3kurc32MkIqCswXCOvSzShioB5wIrVRNnZsrIJN0XoEXc"/>
</div>
</div>
</div>
</nav>
<main class="max-w-7xl mx-auto px-margin-mobile mt-stack-lg space-y-stack-lg">
<!-- Header Section -->
<header class="space-y-stack-sm">
<h1 class="font-headline-xl text-headline-xl text-primary">Activity Planner</h1>
<p class="font-body-md text-on-surface-variant flex items-center gap-2">
<span class="material-symbols-outlined text-secondary" style="font-variation-settings: 'opsz' 20;">calendar_today</span>
                October 24, 2024 • St. Jude’s Youth Organization
            </p>
</header>
<div class="grid grid-cols-1 lg:grid-cols-12 gap-stack-lg">
<!-- Left Column: Primary Details -->
<div class="lg:col-span-8 space-y-stack-lg">
<!-- Activity Details Card -->
<section class="bg-surface-container-lowest rounded-xl p-stack-lg shadow-[0_4px_20px_rgba(30,41,59,0.05)] space-y-stack-md">
<div class="flex items-center gap-2 mb-stack-sm">
<span class="material-symbols-outlined text-secondary">edit_note</span>
<h2 class="font-headline-md text-headline-md text-primary">Activity Details</h2>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-stack-md">
<div class="space-y-unit md:col-span-2">
<label class="font-label-md text-on-surface-variant">Activity Title</label>
<input class="w-full bg-surface border border-outline-variant rounded-lg px-4 py-3 focus:border-secondary-container focus:ring-2 focus:ring-secondary-container/20 transition-all outline-none font-body-md" placeholder="e.g., Annual Harvest Festival" type="text"/>
</div>
<div class="space-y-unit md:col-span-2">
<label class="font-label-md text-on-surface-variant">Purpose / Objective</label>
<textarea class="w-full bg-surface border border-outline-variant rounded-lg px-4 py-3 focus:border-secondary-container focus:ring-2 focus:ring-secondary-container/20 transition-all outline-none font-body-md" placeholder="Define the core spiritual or community goal..." rows="3"></textarea>
</div>
<div class="space-y-unit md:col-span-2">
<label class="font-label-md text-on-surface-variant">Theme</label>
<select class="w-full bg-surface border border-outline-variant rounded-lg px-4 py-3 focus:border-secondary-container focus:ring-2 focus:ring-secondary-container/20 transition-all outline-none font-body-md appearance-none">
<option>Select a Theme</option>
<option>Community Outreach</option>
<option>Youth Development</option>
<option>Spiritual Growth</option>
<option>Worship &amp; Praise</option>
</select>
</div>
</div>
</section>
<!-- Logistics Card -->
<section class="bg-surface-container-lowest rounded-xl p-stack-lg shadow-[0_4px_20px_rgba(30,41,59,0.05)] space-y-stack-md">
<div class="flex items-center gap-2 mb-stack-sm">
<span class="material-symbols-outlined text-secondary">location_on</span>
<h2 class="font-headline-md text-headline-md text-primary">Logistics</h2>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-stack-md">
<div class="space-y-unit">
<label class="font-label-md text-on-surface-variant">Date</label>
<input class="w-full bg-surface border border-outline-variant rounded-lg px-4 py-3 focus:border-secondary-container transition-all outline-none font-body-md" type="date"/>
</div>
<div class="space-y-unit">
<label class="font-label-md text-on-surface-variant">Time</label>
<input class="w-full bg-surface border border-outline-variant rounded-lg px-4 py-3 focus:border-secondary-container transition-all outline-none font-body-md" type="time"/>
</div>
<div class="space-y-unit">
<label class="font-label-md text-on-surface-variant">Location</label>
<input class="w-full bg-surface border border-outline-variant rounded-lg px-4 py-3 focus:border-secondary-container transition-all outline-none font-body-md" placeholder="Church Hall, Park, etc." type="text"/>
</div>
<div class="space-y-unit">
<label class="font-label-md text-on-surface-variant">Estimated Attendance</label>
<input class="w-full bg-surface border border-outline-variant rounded-lg px-4 py-3 focus:border-secondary-container transition-all outline-none font-body-md" placeholder="0" type="number"/>
</div>
</div>
</section>
<!-- Program Card -->
<section class="bg-surface-container-lowest rounded-xl p-stack-lg shadow-[0_4px_20px_rgba(30,41,59,0.05)] space-y-stack-md">
<div class="flex items-center justify-between mb-stack-sm">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-secondary">list_alt</span>
<h2 class="font-headline-md text-headline-md text-primary">Program</h2>
</div>
<button class="flex items-center gap-1 text-secondary font-label-md hover:bg-secondary-fixed px-3 py-1.5 rounded-full transition-colors active:scale-95">
<span class="material-symbols-outlined text-[18px]">add</span> Add Item
                        </button>
</div>
<div class="overflow-x-auto">
<table class="w-full text-left border-collapse">
<thead>
<tr class="border-b border-outline-variant">
<th class="py-3 font-label-md text-on-surface-variant">Start Time</th>
<th class="py-3 font-label-md text-on-surface-variant">Activity / Description</th>
<th class="py-3 font-label-md text-on-surface-variant">Assigned To</th>
<th class="py-3 w-8"></th>
</tr>
</thead>
<tbody class="divide-y divide-surface-container">
<tr>
<td class="py-4"><input class="bg-transparent border-none p-0 w-20 font-body-sm text-primary focus:ring-0" type="text" value="09:00 AM"/></td>
<td class="py-4"><input class="bg-transparent border-none p-0 w-full font-body-sm text-primary focus:ring-0" type="text" value="Opening Prayer &amp; Welcome"/></td>
<td class="py-4"><input class="bg-transparent border-none p-0 w-full font-body-sm text-primary focus:ring-0" type="text" value="Pastor John"/></td>
<td class="py-4"><button class="material-symbols-outlined text-outline hover:text-error transition-colors">delete</button></td>
</tr>
<tr>
<td class="py-4"><input class="bg-transparent border-none p-0 w-20 font-body-sm text-on-surface-variant focus:ring-0" placeholder="Time" type="text"/></td>
<td class="py-4"><input class="bg-transparent border-none p-0 w-full font-body-sm text-on-surface-variant focus:ring-0" placeholder="New activity..." type="text"/></td>
<td class="py-4"><input class="bg-transparent border-none p-0 w-full font-body-sm text-on-surface-variant focus:ring-0" placeholder="Assignee" type="text"/></td>
<td class="py-4"><button class="material-symbols-outlined text-outline hover:text-error transition-colors">delete</button></td>
</tr>
</tbody>
</table>
</div>
</section>
</div>
<!-- Right Column: Coordination & Supplies -->
<div class="lg:col-span-4 space-y-stack-lg">
<!-- Refreshments & Supplies Card -->
<section class="bg-surface-container-lowest rounded-xl p-stack-lg shadow-[0_4px_20px_rgba(30,41,59,0.05)] space-y-stack-md">
<div class="flex items-center gap-2 mb-stack-sm">
<span class="material-symbols-outlined text-secondary">restaurant</span>
<h2 class="font-headline-md text-headline-md text-primary">Supplies</h2>
</div>
<div class="space-y-stack-md">
<div class="space-y-unit">
<label class="font-label-md text-on-surface-variant">Food &amp; Refreshments</label>
<textarea class="w-full bg-surface border border-outline-variant rounded-lg px-4 py-3 focus:border-secondary-container transition-all outline-none font-body-md" placeholder="List items like Coffee, Donuts, Lunch..." rows="3"></textarea>
</div>
<div class="space-y-unit">
<label class="font-label-md text-on-surface-variant">Checklist: Supplies Needed</label>
<div class="space-y-2 mt-2">
<label class="flex items-center gap-3 group cursor-pointer">
<input class="w-5 h-5 rounded border-outline-variant text-secondary-container focus:ring-secondary-container" type="checkbox"/>
<span class="font-body-sm text-on-surface group-hover:text-primary transition-colors">Microphones &amp; Audio System</span>
</label>
<label class="flex items-center gap-3 group cursor-pointer">
<input class="w-5 h-5 rounded border-outline-variant text-secondary-container focus:ring-secondary-container" type="checkbox"/>
<span class="font-body-sm text-on-surface group-hover:text-primary transition-colors">Printed Bulletins</span>
</label>
<label class="flex items-center gap-3 group cursor-pointer">
<input class="w-5 h-5 rounded border-outline-variant text-secondary-container focus:ring-secondary-container" type="checkbox"/>
<span class="font-body-sm text-on-surface group-hover:text-primary transition-colors">Name Tags</span>
</label>
<div class="flex items-center gap-2 mt-4">
<input class="flex-1 bg-transparent border-b border-outline-variant py-1 font-body-sm outline-none focus:border-secondary" placeholder="Add custom item..." type="text"/>
<button class="material-symbols-outlined text-secondary">add_circle</button>
</div>
</div>
</div>
</div>
</section>
<!-- Coordination Card -->
<section class="bg-surface-container-lowest rounded-xl p-stack-lg shadow-[0_4px_20px_rgba(30,41,59,0.05)] space-y-stack-md">
<div class="flex items-center gap-2 mb-stack-sm">
<span class="material-symbols-outlined text-secondary">groups</span>
<h2 class="font-headline-md text-headline-md text-primary">Coordination</h2>
</div>
<div class="space-y-stack-md">
<div class="space-y-unit">
<label class="font-label-md text-on-surface-variant">Lead Organizer</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline">person</span>
<input class="w-full bg-surface border border-outline-variant rounded-lg pl-10 pr-4 py-3 focus:border-secondary-container transition-all outline-none font-body-md" placeholder="Name of primary contact" type="text"/>
</div>
</div>
<div class="space-y-unit">
<label class="font-label-md text-on-surface-variant">Budget Allocation</label>
<div class="relative">
<span class="absolute left-4 top-1/2 -translate-y-1/2 text-outline font-body-md">$</span>
<input class="w-full bg-surface border border-outline-variant rounded-lg pl-8 pr-4 py-3 focus:border-secondary-container transition-all outline-none font-body-md" placeholder="0.00" type="number"/>
</div>
</div>
</div>
</section>
<!-- Action Button -->
<button class="w-full bg-secondary-container text-on-secondary-container font-headline-md py-4 rounded-xl shadow-lg hover:shadow-xl active:scale-[0.98] transition-all flex items-center justify-center gap-2">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">save</span>
                    Finalize Activity Plan
                </button>
</div>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 bg-surface-container-lowest shadow-[0_-4px_20px_rgba(30,41,59,0.05)] rounded-t-xl border-t border-outline-variant">
<div class="flex justify-around items-center px-4 py-3 pb-8"><button class="flex flex-col items-center justify-center text-on-surface-variant px-6 py-1 hover:text-secondary transition-all">
<span class="material-symbols-outlined">home</span>
<span class="font-label-sm text-label-sm">Home</span>
</button>
<button class="flex flex-col items-center justify-center bg-secondary-container text-on-secondary-container rounded-full px-6 py-1 active:scale-90 transition-all duration-150">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">calendar_today</span>
<span class="font-label-sm text-label-sm">Plan</span>
</button>
<button class="flex flex-col items-center justify-center text-on-surface-variant px-6 py-1 hover:text-secondary transition-all">
<span class="material-symbols-outlined">auto_stories</span>
<span class="font-label-sm text-label-sm">Resources</span>
</button>
<button class="flex flex-col items-center justify-center text-on-surface-variant px-6 py-1 hover:text-secondary transition-all">
<span class="material-symbols-outlined">build</span>
<span class="font-label-sm text-label-sm">Tools</span>
</button></div>
</nav>
<!-- Navigation FAB (Optional for Task Focus) -->
<div class="fixed bottom-24 right-6 md:right-margin-tablet">
<button class="w-14 h-14 bg-primary text-on-primary rounded-full shadow-2xl flex items-center justify-center active:scale-90 transition-transform">
<span class="material-symbols-outlined">share</span>
</button>
</div>
</body></html>
